spring:
  application:
    name: careerpilot-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/careerpilot}
    username: ${DATABASE_USERNAME:careerpilot}
    password: ${DATABASE_PASSWORD:careerpilot}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-1.5-flash}
  cloudinary:
    url: ${CLOUDINARY_URL:}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
