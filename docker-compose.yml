services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: careerpilot
      POSTGRES_USER: careerpilot
      POSTGRES_PASSWORD: careerpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/careerpilot
      DATABASE_USERNAME: careerpilot
      DATABASE_PASSWORD: careerpilot
      JWT_SECRET: change-me-change-me-change-me-change-me-change-me
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend
volumes:
  postgres_data:
